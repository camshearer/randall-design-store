[build]
# Installs workspace deps from monorepo root, then builds Medusa.
# Railway root directory must be set to the repo root (see README).
buildCommand = "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @randall-design/medusa build"

[deploy]
# Runs DB migrations then starts the server.
startCommand = "pnpm --filter @randall-design/medusa migrate && pnpm --filter @randall-design/medusa start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 300
