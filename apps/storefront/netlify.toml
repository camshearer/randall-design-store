[build]
  # Build from the repo root so pnpm workspace resolution works.
  base    = "/"
  command = "npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @randall-design/storefront build"
  publish = "apps/storefront/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/*"
  to     = "/.netlify/functions/entry"
  status = 200
